site_name: trnrand
site_description: Random number generation for AWS Trainium via NKI
site_url: https://trnsci.dev/trnrand/
repo_url: https://github.com/trnsci/trnrand
repo_name: trnsci/trnrand

theme:
  name: material
  font:
    text: Atkinson Hyperlegible
    code: Atkinson Hyperlegible Mono
  palette:
    scheme: default
    primary: indigo
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - API Reference:
      - Generator: api/generator.md
      - Distributions: api/distributions.md
      - Quasi-random: api/quasi.md
      - NKI Backend: api/nki.md
  - Architecture: architecture.md
  - Contributing:
      - Developing NKI kernels: developing_kernels.md
  - Design:
      - SBUF-resident streaming Generator (Phase 3 RFC): design/sbuf_resident_generator.md
      - Counter-partitioned multi-chip RNG (Phase 4 RFC): design/counter_partitioned_multichip.md
  - Roadmap: roadmap.md
  - Benchmarks: benchmarks.md
  - Deployment:
      - AWS Setup for Neuron CI: aws_setup.md
  - Release procedure: release.md
  - API stability: stability.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
