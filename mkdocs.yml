site_name: trnrand
site_description: Random number generation for AWS Trainium via NKI
site_url: https://scttfrdmn.github.io/trnrand/
repo_url: https://github.com/scttfrdmn/trnrand
repo_name: scttfrdmn/trnrand

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - API Reference:
      - Generator: api/generator.md
      - Distributions: api/distributions.md
      - Quasi-random: api/quasi.md
      - NKI Backend: api/nki.md
  - Architecture: architecture.md
  - Benchmarks: benchmarks.md
  - AWS Setup: aws_setup.md
  - Release procedure: release.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
